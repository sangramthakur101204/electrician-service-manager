server.port=${PORT:8080}
server.address=0.0.0.0

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/servicemanager?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Tsangram014@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# App Name
spring.application.name=ElectroServe - Electrician Service Manager

# Logging
logging.level.com.electrician=INFO
logging.level.org.springframework.web=WARN
